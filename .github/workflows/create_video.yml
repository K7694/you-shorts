name: YOU — Auto YouTube Shorts

on:
  # ── PHASE 2: 3x daily cron re-enabled — week-long test ──
  # Recipe locked: product-first generation + Subway Surfers
  # brainrot + on-screen URL overlay + pinned affiliate comment.
  # Mascot overlay disabled to save image-gen tokens.
  # Goal: 21 videos in 7 days, then review analytics + iterate.
  schedule:
    - cron: '30 3 * * *'   # 9:00 AM IST
    - cron: '30 9 * * *'   # 3:00 PM IST
    - cron: '30 15 * * *'  # 9:00 PM IST

  # Manual trigger always available
  workflow_dispatch:

jobs:
  create-video:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Allow workflow to push state files back to the repo
    permissions:
      contents: write

    steps:

      # ── 1. Get the code ───────────────────────────────────────
      #    Background video is fetched separately from a GitHub
      #    Release (see step 1b) — keeps it out of LFS so we don't
      #    burn the free 1GB/month LFS bandwidth quota.
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 1b. Fetch background video (Subway Surfers clip) ──────
      #    Cached by release tag — first run downloads 447MB,
      #    subsequent runs hit the cache (free, no bandwidth used).
      #    To swap the clip: upload a new release asset and bump
      #    the tag below (e.g. assets-v2).
      - name: Cache background video
        id: cache-bg
        uses: actions/cache@v4
        with:
          path: assets/subway_surfers_1hr_gameplay.mp4
          key: bg-video-assets-v1

      - name: Download background video (cache miss only)
        if: steps.cache-bg.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p assets
          # Repo is private — use gh CLI (auto-authenticated via GH_TOKEN)
          # instead of the public /releases/download URL which 404s for private repos.
          gh release download assets-v1 \
            --repo ${{ github.repository }} \
            --pattern 'subway_surfers_1hr_gameplay.mp4' \
            --dir assets
          ls -lh assets/subway_surfers_1hr_gameplay.mp4

      # ── 2. Python setup ───────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Cache pip packages ─────────────────────────────────
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      # ── 4. Cache Whisper model (base, ~150MB) ─────────────────
      - name: Cache Whisper model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: whisper-base-v1

      # ── 5. Install system dependencies ───────────────────────
      #    Step-level 5min timeout so an Ubuntu mirror hang fails
      #    fast (we lost a full 30-min budget once when apt-get
      #    update hung). Without this cap, transient apt issues
      #    eat the whole workflow timeout.
      - name: Install FFmpeg + fonts
        timeout-minutes: 5
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ffmpeg fonts-liberation fonts-freefont-ttf

      # ── 6. Install Python dependencies ───────────────────────
      - name: Install Python packages
        run: pip install -r requirements.txt

      # ── 7. Write credentials from GitHub Secrets ─────────────
      #    These files are never stored in the repo.
      #    They are written fresh on every run from your secrets.
      - name: Write credentials
        run: |
          echo '${{ secrets.CLIENT_SECRETS_JSON }}' > client_secrets.json
          echo '${{ secrets.YOUTUBE_TOKEN_JSON }}' > youtube_token.json

      # ── 8a. Refresh Analyzer brief if stale (>20 hrs old) ────
      #    Keeps the content brief fresh so scripts don't recycle
      #    the same prescribed topic/hook across runs.
      #    Falls through on failure — the pipeline has its own fallback.
      - name: Refresh Analyzer brief (if stale)
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          YOUTUBE_DATA_API_KEY: ${{ secrets.YOUTUBE_DATA_API_KEY }}
          PYTHONIOENCODING: utf-8
        run: python refresh_brief.py

      # ── 8b. Run the pipeline ───────────────────────────────────
      - name: Create and upload video
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          YOUTUBE_DATA_API_KEY: ${{ secrets.YOUTUBE_DATA_API_KEY }}
          PYTHONIOENCODING: utf-8
        run: python you.py

      # ── 9. Save state back to repo ───────────────────────────
      #    Saves: used topics list, token refresh, feedback logs,
      #    analyzer brief and top performers (for self-improvement).
      #    [skip ci] prevents this commit from triggering the workflow again.
      - name: Save state to repo
        if: always()
        run: |
          git config user.name "YOU Bot"
          git config user.email "you-bot@automation.local"

          # Stage state files (credentials are gitignored and never committed)
          git add used_topics.json 2>/dev/null || true
          git add analyzer/        2>/dev/null || true
          git add feedback/        2>/dev/null || true

          # Only commit if something actually changed
          git diff --staged --quiet && echo "No state changes." || \
            git commit -m "auto: update state [skip ci]"

          git push || echo "Push failed — nothing to push or no changes"
