name: YOU — Auto YouTube Shorts

on:
  # ── RESET (2026-05-31): 1x/day curiosity science ──
  # Channel reverted from AI-affiliate (failed) to Phase 0 curiosity
  # content (worked) per RESET_BUILD_SPEC.md. Monetization OFF.
  # 1x/day is the conservative, free-tier-safe cadence that avoids
  # re-tripping the "spam volume" signal on a recovering channel.
  # Diagnostic batch: 6 videos over ~7 days, then read the verdict.
  schedule:
    - cron: '30 3 * * *'   # 9:00 AM IST

  # Manual trigger always available
  workflow_dispatch:

jobs:
  create-video:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Allow workflow to push state files back to the repo
    permissions:
      contents: write

    steps:

      # ── 1. Get the code ───────────────────────────────────────
      #    NOTE (2026-06-27): the Subway Surfers background-video
      #    cache/download steps were removed — USE_BACKGROUND_VIDEO is
      #    False (visuals are the Pexels slideshow). The 447MB clip
      #    still lives in the assets-v1 GitHub Release; restore the
      #    cache+`gh release download` steps if that mode returns.
      #    The Whisper model cache is gone too — word timings now come
      #    from Edge TTS WordBoundary events (no transcription step).
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python setup ───────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Cache pip packages ─────────────────────────────────
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      # ── 5. Install system dependencies ───────────────────────
      #    Step-level 5min timeout so an Ubuntu mirror hang fails
      #    fast (we lost a full 30-min budget once when apt-get
      #    update hung). Without this cap, transient apt issues
      #    eat the whole workflow timeout.
      - name: Install FFmpeg + fonts
        timeout-minutes: 5
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ffmpeg fonts-liberation fonts-freefont-ttf

      # ── 6. Install Python dependencies ───────────────────────
      - name: Install Python packages
        run: pip install -r requirements.txt

      # ── 7. Write credentials from GitHub Secrets ─────────────
      #    These files are never stored in the repo.
      #    They are written fresh on every run from your secrets.
      - name: Write credentials
        run: |
          echo '${{ secrets.CLIENT_SECRETS_JSON }}' > client_secrets.json
          echo '${{ secrets.YOUTUBE_TOKEN_JSON }}' > youtube_token.json

      # ── 8a. Refresh Analyzer brief if stale (>20 hrs old) ────
      #    Keeps the content brief fresh so scripts don't recycle
      #    the same prescribed topic/hook across runs.
      #    Falls through on failure — the pipeline has its own fallback.
      - name: Refresh Analyzer brief (if stale)
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          YOUTUBE_DATA_API_KEY: ${{ secrets.YOUTUBE_DATA_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PYTHONIOENCODING: utf-8
        run: python refresh_brief.py

      # ── 8b. Run the pipeline ───────────────────────────────────
      - name: Create and upload video
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          YOUTUBE_DATA_API_KEY: ${{ secrets.YOUTUBE_DATA_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PYTHONIOENCODING: utf-8
        run: python you.py

      # ── 9. Save state back to repo ───────────────────────────
      #    Saves: used topics list, token refresh, feedback logs,
      #    analyzer brief and top performers (for self-improvement).
      #    [skip ci] prevents this commit from triggering the workflow again.
      - name: Save state to repo
        if: always()
        run: |
          git config user.name "YOU Bot"
          git config user.email "you-bot@automation.local"

          # Stage state files (credentials are gitignored and never committed)
          git add used_topics.json 2>/dev/null || true
          git add analyzer/        2>/dev/null || true
          git add feedback/        2>/dev/null || true

          # Only commit if something actually changed
          git diff --staged --quiet && echo "No state changes." || \
            git commit -m "auto: update state [skip ci]"

          git push || echo "Push failed — nothing to push or no changes"
